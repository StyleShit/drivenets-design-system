name: Install
description: Install Node.js, pnpm, and dependencies

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@ab5d408e9d066b8ffe7503f789d50fd7e35c0c92 # v6.0.7
      with:
        cache: true

    - name: Install Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc

    - name: Install Dependencies
      shell: bash
      env:
        # Skip Husky installation.
        # See: https://github.com/typicode/husky/blob/ec10d87db/index.js#L9
        HUSKY: '0'
      run: pnpm i
